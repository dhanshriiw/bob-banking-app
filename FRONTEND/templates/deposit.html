{% extends "base.html" %}
{% block title %}Deposit — SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-7 col-lg-5">

    <!-- Back link -->
    <a href="{{ url_for('dashboard.dashboard') }}"
       class="btn btn-link ps-0 mb-3 text-decoration-none">
      ← Back to Dashboard
    </a>

    <div class="card shadow-sm">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0 fw-semibold">⬆ Deposit Funds</h5>
      </div>
      <div class="card-body p-4">

        <p class="text-muted mb-4">
          Enter the amount you wish to deposit into your savings account.
        </p>

        <form method="POST" action="{{ url_for('transactions.deposit') }}" novalidate>

          <!-- Amount field -->
          <div class="mb-4">
            <label for="amount" class="form-label fw-medium">Deposit Amount</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text fw-bold">$</span>
              <input
                type="number"
                class="form-control"
                id="amount"
                name="amount"
                min="0.01"
                step="0.01"
                max="1000000"
                placeholder="0.00"
                required
              />
            </div>
            <div class="form-text">
              Enter a positive amount up to $1,000,000.
            </div>
          </div>

          <!-- Actions -->
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success btn-lg flex-grow-1">
              Confirm Deposit
            </button>
            <a href="{{ url_for('dashboard.dashboard') }}"
               class="btn btn-outline-secondary btn-lg">
              Cancel
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
